services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - hf_cache_slovar:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  embeddings:
    profiles: ["embedder"]
    build:
      context: .
      dockerfile: Dockerfile.embedder
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - hf_cache_slovar:/root/.cache/huggingface
    ports:
      - "${EMBEDDING_SERVICE_PORT:-8080}:8080"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5434:5432"
    volumes:
      - pgdata_slovar:/var/lib/postgresql/data

volumes:
  pgdata_slovar:
  hf_cache_slovar:
